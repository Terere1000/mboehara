<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" width="200" height="260" role="img" aria-label="Jasy Jateré mascot">
  <!-- Jasy Jateré: fair-haired Guaraní forest spirit, stick-figure style -->
  <g fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Magic staff (yvyra'i) -->
    <line x1="150" y1="120" x2="150" y2="245"/>
    <path d="M150 120 q14 -6 8 -18 q-10 4 -8 18" fill="#1a1a1a"/>

    <!-- Blonde hair (long, flowing) -->
    <path d="M70 70 q-14 -34 30 -50 q44 16 30 50" fill="#f6c945" stroke="#e0ae18"/>
    <path d="M70 70 q-10 26 -2 46" fill="#f6c945" stroke="#e0ae18"/>
    <path d="M130 70 q10 26 2 46" fill="#f6c945" stroke="#e0ae18"/>

    <!-- Head -->
    <circle cx="100" cy="62" r="30" fill="#fff"/>
    <!-- Face -->
    <g class="face-happy">
      <circle cx="90" cy="58" r="2.4" fill="#1a1a1a" stroke="none"/>
      <circle cx="110" cy="58" r="2.4" fill="#1a1a1a" stroke="none"/>
      <path d="M88 70 q12 12 24 0"/>
    </g>

    <!-- Body -->
    <line x1="100" y1="92" x2="100" y2="160"/>
    <!-- Arms: one raised in a wave -->
    <path d="M100 110 q-26 -10 -34 -34"/>
    <path d="M100 116 q24 6 38 4"/>
    <!-- Legs -->
    <line x1="100" y1="160" x2="78" y2="210"/>
    <line x1="100" y1="160" x2="122" y2="208"/>
    <!-- Feet -->
    <line x1="78" y1="210" x2="66" y2="214"/>
    <line x1="122" y1="208" x2="134" y2="212"/>
  </g>
</svg>
