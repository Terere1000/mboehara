<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mbo'ehára — Aprendé Guaraní</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="assets/mascot.svg" type="image/svg+xml" />
</head>
<body>
  <!-- Top bar -->
  <header class="topbar">
    <button class="brand" id="brand-home">
      <img src="assets/mascot.svg" alt="Mbo'ehára" class="brand-mascot" />
      <span class="brand-name">Mbo'ehára</span>
    </button>
    <div class="stats">
      <span class="stat" id="stat-streak" title="streak">🔥 <b>0</b></span>
      <span class="stat" id="stat-xp" title="xp">⭐ <b>0</b></span>
      <span class="stat level" id="stat-level">Lv 1</span>
      <button class="lang-toggle" id="lang-toggle">EN</button>
    </div>
  </header>

  <!-- App root -->
  <main id="app"></main>

  <footer class="footer">
    <span data-i18n="footer.note"></span>
  </footer>

  <!-- Data -->
  <script src="js/data/curriculum.js"></script>
  <script src="js/data/index.js"></script>
  <script src="js/data/expressions.js"></script>
  <!-- Core -->
  <script src="js/i18n.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
